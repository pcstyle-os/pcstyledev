<!DOCTYPE html>
<html class="light" lang="en">
  <head>
    <script>
      (function () {
        try {
          var r = document.documentElement;
          var sk = localStorage.getItem("pcstyle-skin");
          var skin = sk === "editorial" || sk === "artifact" ? sk : "artifact";
          r.dataset.skin = skin;
          if (skin === "artifact") {
            r.classList.remove("light");
            r.classList.add("dark");
          } else {
            var k = "pcstyle-theme";
            var t = localStorage.getItem(k);
            var d = t === "dark" || (!t && matchMedia("(prefers-color-scheme: dark)").matches);
            r.classList.remove("light", "dark");
            r.classList.add(d ? "dark" : "light");
          }
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adam Krupa — Frontend designer & UI engineer | pcstyle.dev</title>

      name="description"
      content="Adam Krupa (pcstyle.dev): frontend designer and UI engineer — React, TypeScript, design systems, portfolio."
    />
